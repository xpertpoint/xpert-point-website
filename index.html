<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XpertPoint — Alege Serviciul (Minimal)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a08;
    --white: #f5f3ee;
    --rust: #c0410b;
    --tan: #c9b99a;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    font-weight: 300;
    overflow: hidden;
    position: relative;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* FULL-BLEED HOVER BACKGROUNDS */
  .bg-layer {
    position: fixed; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0;
    transform: scale(1.06);
    transition: opacity 0.9s ease, transform 1.2s ease;
    z-index: 0;
  }
  .bg-layer.active { opacity: 1; transform: scale(1); }
  .bg-biciclete { background-image: url('https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=1920&q=85'); }
  .bg-cafea { background-image: url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=1920&q=85'); }
  .bg-scrim {
    position: fixed; inset: 0;
    background: rgba(10,10,8,0.72);
    z-index: 1;
    transition: background 0.6s ease;
  }
  body.hovering .bg-scrim { background: rgba(10,10,8,0.55); }

  .brand {
    position: fixed; top: 2.2rem; left: 50%; transform: translateX(-50%);
    z-index: 5;
    font-family: var(--font-display);
    font-size: 1.5rem; letter-spacing: 0.05em;
    text-align: center;
  }
  .brand span { color: var(--rust); }
  .brand small {
    display: block; font-family: var(--font-body);
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(245,243,238,0.45); margin-top: 0.3rem;
  }

  .menu {
    position: relative; z-index: 5;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }
  .menu-item {
    position: relative;
    text-decoration: none;
    color: var(--white);
    padding: 1.3rem 2rem;
    text-align: center;
    border-top: 1px solid rgba(245,243,238,0.12);
  }
  .menu-item:last-child { border-bottom: 1px solid rgba(245,243,238,0.12); }
  .menu-title {
    font-family: var(--font-display);
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    line-height: 1;
    letter-spacing: 0.02em;
    color: rgba(245,243,238,0.35);
    transition: color 0.4s ease, letter-spacing 0.4s ease;
  }
  .menu-item:hover .menu-title { letter-spacing: 0.04em; }
  .menu-title em { font-style: normal; }
  #itemBiciclete:hover .menu-title { color: var(--white); }
  #itemBiciclete:hover .menu-title em { color: var(--white); }
  #itemCafea:hover .menu-title { color: var(--rust); }
  #itemCafea:hover .menu-title em { color: var(--rust); }
  .menu-sub {
    font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(245,243,238,0.3);
    margin-top: 0.5rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .menu-item:hover .menu-sub { opacity: 1; transform: translateY(0); }

  @media (max-width: 700px) {
    .menu-title { font-size: clamp(2.8rem, 15vw, 4.5rem); }
    .brand { top: 1.3rem; }
  }

  /* COOKIE-CONSENT:START */
  .cookie-banner {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000;
    background: #141410;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 1.25rem 2rem;
  }
  .cookie-banner[hidden] { display: none; }
  .cookie-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.4);
  }
  .cookie-overlay[hidden] { display: none; }
  .cookie-banner-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 2rem;
    max-width: 1200px; margin: 0 auto; flex-wrap: wrap;
  }
  .cookie-banner-text { font-size: 0.85rem; line-height: 1.6; color: rgba(245,243,238,0.75); flex: 1 1 420px; }
  .cookie-banner-actions { display: flex; gap: 0.75rem; flex-shrink: 0; }
  .cookie-btn-reject, .cookie-btn-accept {
    font-family: var(--font-body); font-size: 0.8rem; letter-spacing: 0.05em;
    padding: 0.65rem 1.4rem; border-radius: 2px; cursor: pointer;
    transition: opacity .2s, background .2s;
  }
  .cookie-btn-reject { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--white); }
  .cookie-btn-reject:hover { border-color: rgba(255,255,255,0.4); }
  .cookie-btn-accept { background: var(--rust); border: 1px solid transparent; color: var(--white); }
  .cookie-btn-accept:hover { opacity: 0.85; }
  @media (max-width: 700px) {
    .cookie-banner-inner { flex-direction: column; align-items: stretch; text-align: center; }
    .cookie-banner-actions { justify-content: center; }
  }
  /* COOKIE-CONSENT:END */
</style>
</head>
<body>

<div class="bg-layer bg-biciclete" id="bgBiciclete"></div>
<div class="bg-layer bg-cafea" id="bgCafea"></div>
<div class="bg-scrim" id="scrim"></div>

<div class="brand">XPERT<span>POINT</span><small>Ce reparăm astăzi?</small></div>

<div class="menu">
  <a href="bike_page.html" class="menu-item" id="itemBiciclete">
    <div class="menu-title">BICI<em>CLETE</em></div>
    <div class="menu-sub">Revizii & reparații — programare rapidă</div>
  </a>
  <a href="coffee_page.html" class="menu-item" id="itemCafea">
    <div class="menu-title">ESPRESS<em>OARE</em></div>
    <div class="menu-sub">Aparate espressor — curățare & reparații</div>
  </a>
</div>

<!-- COOKIE-CONSENT:START -->
<div class="cookie-overlay" id="cookieOverlay" hidden></div>
<div class="cookie-banner" id="cookieBanner" hidden>
  <div class="cookie-banner-inner">
    <p class="cookie-banner-text">Folosim cookie-uri pentru a îmbunătăți experiența ta pe site și pentru statistici și marketing (Google, Meta). Poți accepta sau refuza cookie-urile non-esențiale.</p>
    <div class="cookie-banner-actions">
      <button type="button" class="cookie-btn-reject" id="cookieRejectBtn">Refuz</button>
      <button type="button" class="cookie-btn-accept" id="cookieAcceptBtn">Accept</button>
    </div>
  </div>
</div>
<!-- COOKIE-CONSENT:END -->

<script>
  // LEAD-SOURCE:START
  function detectLeadSource() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('gclid')) return 'google_ads';
    if (params.get('fbclid') || ['facebook', 'instagram'].includes(params.get('utm_source'))) return 'meta_ads';
    if (params.get('utm_source')) return `${params.get('utm_source')}/${params.get('utm_medium') || 'n/a'}`;
    return 'organic_direct';
  }
  if (!sessionStorage.getItem('xp_lead_source')) {
    sessionStorage.setItem('xp_lead_source', detectLeadSource());
  }
  // LEAD-SOURCE:END

  // TRACKING:START (pageview only — no forms on this page, so no conversion events fired here)
  const GA4_MEASUREMENT_ID = 'G-XXXXXXXXXX'; // TODO: paste real GA4 Measurement ID
  const META_PIXEL_ID = 'XXXXXXXXXXXXXXX'; // TODO: paste real Meta Pixel ID

  function loadTrackingScripts() {
    if (window.__xpTrackingLoaded) return;
    window.__xpTrackingLoaded = true;

    const gaScript = document.createElement('script');
    gaScript.src = `https://www.googletagmanager.com/gtag/js?id=${GA4_MEASUREMENT_ID}`;
    gaScript.async = true;
    document.head.appendChild(gaScript);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function () { dataLayer.push(arguments); };
    gtag('js', new Date());
    gtag('config', GA4_MEASUREMENT_ID);

    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return; n = f.fbq = function () { n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments); };
      if (!f._fbq) f._fbq = n; n.push = n; n.loaded = true; n.version = '2.0'; n.queue = [];
      t = b.createElement(e); t.async = true; t.src = v;
      s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', META_PIXEL_ID);
    fbq('track', 'PageView');
  }
  // TRACKING:END

  // COOKIE-CONSENT:START
  const COOKIE_CONSENT_KEY = 'xp_cookie_consent';
  const cookieBanner = document.getElementById('cookieBanner');
  const cookieOverlay = document.getElementById('cookieOverlay');
  function setCookieConsent(value) {
    localStorage.setItem(COOKIE_CONSENT_KEY, value);
    cookieBanner.hidden = true;
    cookieOverlay.hidden = true;
    document.body.style.overflow = '';
    if (value === 'accepted' && typeof loadTrackingScripts === 'function') loadTrackingScripts();
  }
  function showCookieBanner() {
    cookieBanner.hidden = false;
    cookieOverlay.hidden = false;
    document.body.style.overflow = 'hidden';
  }
  const existingCookieConsent = localStorage.getItem(COOKIE_CONSENT_KEY);
  if (!existingCookieConsent) {
    showCookieBanner();
  } else if (existingCookieConsent === 'accepted' && typeof loadTrackingScripts === 'function') {
    loadTrackingScripts();
  }
  document.getElementById('cookieAcceptBtn').addEventListener('click', () => setCookieConsent('accepted'));
  document.getElementById('cookieRejectBtn').addEventListener('click', () => setCookieConsent('rejected'));
  // COOKIE-CONSENT:END

  const bgBiciclete = document.getElementById('bgBiciclete');
  const bgCafea = document.getElementById('bgCafea');
  const itemBiciclete = document.getElementById('itemBiciclete');
  const itemCafea = document.getElementById('itemCafea');

  itemBiciclete.addEventListener('mouseenter', () => { bgBiciclete.classList.add('active'); document.body.classList.add('hovering'); });
  itemBiciclete.addEventListener('mouseleave', () => { bgBiciclete.classList.remove('active'); document.body.classList.remove('hovering'); });
  itemCafea.addEventListener('mouseenter', () => { bgCafea.classList.add('active'); document.body.classList.add('hovering'); });
  itemCafea.addEventListener('mouseleave', () => { bgCafea.classList.remove('active'); document.body.classList.remove('hovering'); });
</script>
</body>
</html>
